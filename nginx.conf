server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Habilitar CORS si los archivos se consumen desde otros dominios
    add_header Access-Control-Allow-Origin *;

    location / {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
